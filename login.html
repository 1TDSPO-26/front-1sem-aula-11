<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESPORTE TOTAL - LOGIN</title>

    <link rel="stylesheet" href="./css/main.css" />

    <script src="./js/script.js" defer></script>

  </head>
  
<body>
  
  <header class="cabecalho">
    <nav class="cabecalho__nav">
      <ul class="cabecalho__ul">
        <li class="cabecalho__li">
          <a class="cabecalho__a" href="./index.html">Home</a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero__container">
        <h1 class="hero__title">CONTROLE DE ACESSO</h1>

        <dialog id="meuModal">
          <button aria-label="Fechar janela" id="fecharModal">X</button>
          <div id="msg">TESTE</div>
        </dialog>

        <div id="msg"></div>
        
        <form class="form" action="#" method="GET">
            <fieldset class="form__fieldset"> 
                <div class="form__box">
                    <label class="form__label" for="idEmail">Email</label>
                    <input class="form__input" type="email" name="email" id="idEmail" placeholder="Digite seu email" minlength="13" maxlength="150" required autocomplete="current-password">
                </div>
                 <div class="form__box"> 
                    <label class="form__label" for="idSenha">Senha</label>
                    <input class="form__input" type="password" name="senha" id="idSenha" placeholder="Digite sua senha" minlength="5" maxlength="30" required autocomplete="current-password">
                </div>
                <div class="form__box">
                  <button class="form__btn" type="submit" id="btnEntrar">Entrar</button>
                </div>
              </fieldset>
            </form>
            
            <a class="hero__btn" href="./login.html">Login</a>
          </div>
        </section>
      </main>
      
      <footer>
        <p>Todos os direitos reservados - ESPORTE TOTAL - &copy; - 2026</p>
      </footer>
      
  </body>
</html>
